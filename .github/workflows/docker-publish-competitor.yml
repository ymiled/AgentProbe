name: Build & Push Competitor Image

on:
  push:
    branches: [main]
    paths:
      - "demos/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: demos/Dockerfile
          push: true
          tags: ghcr.io/ymiled/agentprobe-demo-competitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
